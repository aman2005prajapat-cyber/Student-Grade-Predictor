<!DOCTYPE html>
<html>
<head>
    <title>Grade Predictor</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎓 StudySync Predictor</h2>
        <form action="/predict" method="get">
            <input type="number" name="hours" placeholder="Enter Study Hours" required step="0.1">
            <br>
            <button type="submit">Predict My Grade</button>
        </form>
    </div>
</body>
</html>
